# GraphRAG Configuration for Istanbul Historical Peninsula
# =========================================================

neo4j:
  uri: "${NEO4J_URI:bolt://localhost:7687}"
  username: "${NEO4J_USERNAME:neo4j}"
  password: "${NEO4J_PASSWORD}"

embeddings:
  provider: "sentence_transformer"
  model: "paraphrase-multilingual-MiniLM-L12-v2"
  dimension: 384

vector_index:
  name_prefix: "embedding"
  indexed_labels:
    - "Structure"  # Yapi yerine
    - "Building"   # Ekstra
    - "Person"     # Mimar/Padisah yerine
    - "Location"   # Lokasyon yerine
    - "Document"   # Gri düğümler için kritik!

llm:
  provider: "google"
  model: "gemini-2.5-flash"
  temperature: 0.1
  max_tokens: 2048

retrieval:
  vector_top_k: 8
  graph_max_hops: 3
  hybrid_alpha: 0.4  # 0 = vector only, 1 = graph only (0.4 = slightly more vector weight)
  min_similarity: 0.5  # Higher threshold for more relevant results
  rrf_k: 60  # RRF constant

query:
  intent_classification: true
  entity_extraction: true
  fallback_to_rules: true

documents:
  source_dir: "son-veri"
  chunk_size: 500
  chunk_overlap: 50

logging:
  level: "${LOG_LEVEL:INFO}"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
